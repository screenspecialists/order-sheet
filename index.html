<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Screen Specialists Order Sheet</title>
<link rel="apple-touch-icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+A8AAQUBAScY42YAAAAASUVORK5CYII=">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Order Sheet">
<style>
  :root{
    --ink:#1a1a1a;
    --paper:#fdfdfb;
    --line:#d8d5cc;
    --line-strong:#b8b4a8;
    --accent:#185fa5;
    --accent-light:#e6f1fb;
    --danger:#a32d2d;
    --danger-light:#fcebeb;
    --muted:#6b6862;
    --radius:10px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#ece9e0;
    color:var(--ink);
    padding-bottom:env(safe-area-inset-bottom);
    -webkit-user-select:none;
    user-select:none;
  }
  input, textarea{ -webkit-user-select:text; user-select:text; }

  .topbar{
    position:sticky; top:0; z-index:20;
    background:var(--ink); color:#fff;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px; padding-top:calc(14px + env(safe-area-inset-top));
  }
  .topbar h1{font-size:17px; font-weight:600; margin:0;}
  .topbar .sub{font-size:11px; color:#bdbdbd; margin-top:2px; font-weight:400;}
  .topbar-actions{display:flex; gap:8px;}
  .icon-btn{
    background:rgba(255,255,255,0.12); border:none; color:#fff;
    width:38px; height:38px; border-radius:8px; font-size:18px;
    display:flex; align-items:center; justify-content:center;
  }
  .icon-btn:active{background:rgba(255,255,255,0.22);}

  .wrap{max-width:760px; margin:0 auto; padding:18px 14px 40px;}

  .sheet{
    background:var(--paper);
    border:1px solid var(--line-strong);
    border-radius:var(--radius);
    padding:0;
    overflow:hidden;
  }
  .sheet-header{
    padding:18px 18px 14px;
    border-bottom:2px solid var(--ink);
    text-align:center;
  }
  .sheet-header .brand{
    font-size:19px; font-weight:700; letter-spacing:0.3px;
  }
  .sheet-header .brand-sub{
    font-size:11px; letter-spacing:2px; color:var(--muted); margin-top:3px; text-transform:uppercase;
  }

  .field-row{
    display:grid;
    border-bottom:1px solid var(--line);
  }
  .field-row.cols-2{grid-template-columns:1fr 1fr;}
  .field-row.cols-3{grid-template-columns:1fr 1fr 1fr;}
  .field-row.cols-4{grid-template-columns:1fr 1fr 1fr 1fr;}
  .field-row.cols-1{grid-template-columns:1fr;}

  .field{
    padding:10px 14px;
    border-right:1px solid var(--line);
    min-width:0;
  }
  .field:last-child{border-right:none;}

  .field label{
    display:block;
    font-size:10.5px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color:var(--muted);
    margin-bottom:4px;
  }
  .field input{
    width:100%;
    border:none;
    border-bottom:1px solid transparent;
    background:transparent;
    font-size:16px;
    padding:4px 0 5px;
    color:var(--ink);
    font-family:inherit;
  }
  .field input:focus{
    outline:none;
    border-bottom:1px solid var(--accent);
  }
  .field input::placeholder{color:#c4c1b8;}

  .section-label{
    padding:10px 14px 6px;
    font-size:11px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.6px;
    color:var(--ink);
    background:#f3f1ea;
    border-bottom:1px solid var(--line);
    border-top:1px solid var(--line);
  }

  .diagram-section{padding:14px;}
  .toggle-field{margin-bottom:16px;}
  .toggle-field:last-child{margin-bottom:0;}
  .toggle-field label{
    display:block; font-size:10.5px; font-weight:600; text-transform:uppercase;
    letter-spacing:0.5px; color:var(--muted); margin-bottom:8px;
  }
  .toggle-group{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }
  .toggle-btn{
    background:#fff;
    border:1.5px solid var(--line-strong);
    color:var(--ink);
    font-size:14.5px;
    font-weight:500;
    padding:13px 10px;
    border-radius:8px;
    text-align:center;
  }
  .toggle-btn:active{background:#f0eee6;}
  .toggle-btn.selected{
    background:var(--accent-light);
    border-color:var(--accent);
    color:var(--accent);
    font-weight:600;
  }

  .notes-section{padding:14px;}
  .notes-section label{
    display:block; font-size:10.5px; font-weight:600; text-transform:uppercase;
    letter-spacing:0.5px; color:var(--muted); margin-bottom:6px;
  }
  .notes-section textarea{
    width:100%; min-height:80px; border:1px solid var(--line-strong); border-radius:8px;
    padding:10px 12px; font-size:15px; font-family:inherit; resize:vertical; color:var(--ink);
    background:#fff;
  }
  .notes-section textarea:focus{outline:none; border-color:var(--accent);}

  .submit-bar{
    display:flex; gap:10px; padding:16px 14px 6px;
  }
  .btn{
    flex:1;
    padding:14px;
    border-radius:10px;
    font-size:15px;
    font-weight:600;
    border:none;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn-primary{background:var(--accent); color:#fff;}
  .btn-primary:active{background:#134c85;}
  .btn-secondary{background:#fff; color:var(--ink); border:1px solid var(--line-strong);}
  .btn-secondary:active{background:#f0eee6;}

  .hint-bar{
    text-align:center; font-size:12px; color:var(--muted); padding:10px 14px 0;
  }

  /* History drawer */
  .drawer-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:30;
    opacity:0; pointer-events:none; transition:opacity 0.2s;
  }
  .drawer-backdrop.open{opacity:1; pointer-events:auto;}
  .drawer{
    position:fixed; top:0; right:0; bottom:0; width:min(420px, 92vw);
    background:#fff; z-index:31; transform:translateX(100%);
    transition:transform 0.25s ease; display:flex; flex-direction:column;
  }
  .drawer.open{transform:translateX(0);}
  .drawer-head{
    padding:16px 16px; padding-top:calc(16px + env(safe-area-inset-top));
    border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between;
  }
  .drawer-head h2{font-size:16px; margin:0; font-weight:600;}
  .drawer-list{flex:1; overflow-y:auto; padding:8px 12px;}
  .order-card{
    border:1px solid var(--line); border-radius:8px; padding:12px 14px; margin-bottom:10px;
    display:flex; justify-content:space-between; align-items:flex-start; gap:10px;
  }
  .order-card .meta b{font-size:14.5px; display:block; margin-bottom:2px;}
  .order-card .meta span{font-size:12px; color:var(--muted);}
  .order-card .actions{display:flex; flex-direction:column; gap:6px;}
  .mini-btn{
    background:var(--accent-light); color:var(--accent); border:none; font-size:12px;
    font-weight:600; padding:6px 10px; border-radius:6px; white-space:nowrap;
  }
  .mini-btn.del{background:var(--danger-light); color:var(--danger);}
  .empty-state{
    text-align:center; color:var(--muted); font-size:14px; padding:40px 20px;
  }

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; padding:12px 20px; border-radius:30px;
    font-size:14px; font-weight:500; z-index:40; opacity:0; transition:all 0.25s;
    pointer-events:none; display:flex; align-items:center; gap:8px;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>Screen Specialists</h1>
    <div class="sub">Order sheet</div>
  </div>
  <div class="topbar-actions">
    <button class="icon-btn" id="historyBtn" aria-label="Order history">&#9776;</button>
  </div>
</div>

<div class="wrap">
  <div class="sheet">
    <div class="sheet-header">
      <div class="brand">Screen Specialists order sheet</div>
    </div>

    <div class="field-row cols-1">
      <div class="field"><label for="builder">Builder, address</label><input id="builder" placeholder="—"></div>
    </div>
    <div class="field-row cols-2">
      <div class="field"><label for="location">Location, door number</label><input id="location" placeholder="—"></div>
      <div class="field"><label for="screenType">Screen type</label><input id="screenType" placeholder="—"></div>
    </div>
    <div class="field-row cols-2">
      <div class="field"><label for="daylightHeight">Daylight height</label><input id="daylightHeight" placeholder="—" inputmode="decimal"></div>
      <div class="field"><label for="frameHeight">Frame height</label><input id="frameHeight" placeholder="—" inputmode="decimal"></div>
    </div>
    <div class="field-row cols-2">
      <div class="field"><label for="daylightWidth">Daylight width</label><input id="daylightWidth" placeholder="—" inputmode="decimal"></div>
      <div class="field"><label for="frameWidth">Frame width</label><input id="frameWidth" placeholder="—" inputmode="decimal"></div>
    </div>
    <div class="field-row cols-4">
      <div class="field"><label for="left">Left</label><input id="left" placeholder="—"></div>
      <div class="field"><label for="right">Right</label><input id="right" placeholder="—"></div>
      <div class="field"><label for="double">Double</label><input id="double" placeholder="—"></div>
      <div class="field"><label for="meetingPoint">Meeting point</label><input id="meetingPoint" placeholder="—"></div>
    </div>
    <div class="field-row cols-4">
      <div class="field"><label for="inside">Inside</label><input id="inside" placeholder="—"></div>
      <div class="field"><label for="outside">Outside</label><input id="outside" placeholder="—"></div>
      <div class="field"><label for="near">Near</label><input id="near" placeholder="—"></div>
      <div class="field"><label for="away">Away</label><input id="away" placeholder="—"></div>
    </div>
    <div class="field-row cols-4">
      <div class="field"><label for="cavity">Cavity</label><input id="cavity" placeholder="—"></div>
      <div class="field"><label for="add12mm">Add 12mm</label><input id="add12mm" placeholder="—"></div>
      <div class="field"><label for="notCavity">Not cavity</label><input id="notCavity" placeholder="—"></div>
      <div class="field"><label for="sillCover">Sill cover</label><input id="sillCover" placeholder="—"></div>
    </div>
    <div class="field-row cols-2">
      <div class="field"><label for="sillColour">Sill colour</label><input id="sillColour" placeholder="—"></div>
      <div class="field"><label for="stileColour">Stile colour</label><input id="stileColour" placeholder="—"></div>
    </div>
    <div class="field-row cols-1">
      <div class="field"><label for="frameColour">Frame colour</label><input id="frameColour" placeholder="—"></div>
    </div>
    <div class="field-row cols-3">
      <div class="field"><label for="jambless">Jambless</label><input id="jambless" placeholder="—"></div>
      <div class="field"><label for="xo">XO</label><input id="xo" placeholder="—"></div>
      <div class="field"><label for="normal">Normal</label><input id="normal" placeholder="—"></div>
    </div>
    <div class="field-row cols-2">
      <div class="field"><label for="querkLH">Querk LH</label><input id="querkLH" placeholder="—"></div>
      <div class="field"><label for="querkRH">Querk RH</label><input id="querkRH" placeholder="—"></div>
    </div>
    <div class="field-row cols-2">
      <div class="field"><label for="querkHead">Querk head</label><input id="querkHead" placeholder="—"></div>
      <div class="field"><label for="querkSill">Querk sill</label><input id="querkSill" placeholder="—"></div>
    </div>

    <div class="section-label">Looking from outside</div>
    <div class="diagram-section">
      <div class="toggle-field">
        <label>Handle side</label>
        <div class="toggle-group" data-target="handleSide">
          <button type="button" class="toggle-btn" data-value="Left hand handle">Left hand handle</button>
          <button type="button" class="toggle-btn" data-value="Right hand handle">Right hand handle</button>
        </div>
      </div>
      <div class="toggle-field">
        <label>Near / away</label>
        <div class="toggle-group" data-target="nearAway">
          <button type="button" class="toggle-btn" data-value="Near">Near</button>
          <button type="button" class="toggle-btn" data-value="Away">Away</button>
        </div>
      </div>
      <input type="hidden" id="handleSide">
      <input type="hidden" id="nearAway">
    </div>

    <div class="section-label">Notes</div>
    <div class="notes-section">
      <textarea id="notes" placeholder="Add any extra notes for this order..."></textarea>
    </div>

    <div class="submit-bar">
      <button class="btn btn-secondary" id="newBtn">New order</button>
      <button class="btn btn-primary" id="saveBtn">Save order</button>
    </div>
    <div class="hint-bar">Drafts save automatically on this iPad</div>
  </div>
</div>

<div class="drawer-backdrop" id="drawerBackdrop"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h2>Saved orders</h2>
    <button class="icon-btn" id="closeDrawer" style="background:#f0eee6; color:#1a1a1a;" aria-label="Close">&#10005;</button>
  </div>
  <div class="drawer-list" id="drawerList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  const FIELD_IDS = [
    'builder','location','screenType','daylightHeight','frameHeight','daylightWidth','frameWidth',
    'left','right','double','meetingPoint','inside','outside','near','away',
    'cavity','add12mm','notCavity','sillCover','sillColour','stileColour','frameColour',
    'jambless','xo','normal','querkLH','querkRH','querkHead','querkSill',
    'handleSide','nearAway','notes'
  ];
  const DRAFT_KEY = 'draft';
  const ORDERS_PREFIX = 'order:';

  const toast = document.getElementById('toast');
  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'), 1800);
  }

  // ---------- storage helpers (with safe fallback) ----------
  const hasStorageApi = typeof window.storage !== 'undefined';
  const memoryStore = {};

  async function storeGet(key){
    if(hasStorageApi){
      try{
        const r = await window.storage.get(key, false);
        return r ? r.value : null;
      }catch(e){ return null; }
    }
    return memoryStore[key] !== undefined ? memoryStore[key] : null;
  }
  async function storeSet(key, value){
    if(hasStorageApi){
      try{ await window.storage.set(key, value, false); return true; }
      catch(e){ return false; }
    }
    memoryStore[key] = value;
    return true;
  }
  async function storeDelete(key){
    if(hasStorageApi){
      try{ await window.storage.delete(key, false); return true; }
      catch(e){ return false; }
    }
    delete memoryStore[key];
    return true;
  }
  async function storeList(prefix){
    if(hasStorageApi){
      try{
        const r = await window.storage.list(prefix, false);
        return r ? r.keys : [];
      }catch(e){ return []; }
    }
    return Object.keys(memoryStore).filter(k=>k.startsWith(prefix));
  }

  // ---------- toggle buttons ----------
  function setToggleValue(group, value){
    const hiddenInput = document.getElementById(group.dataset.target);
    hiddenInput.value = value;
    group.querySelectorAll('.toggle-btn').forEach(b=>{
      b.classList.toggle('selected', b.dataset.value === value);
    });
    saveDraftDebounced();
  }

  document.querySelectorAll('.toggle-group').forEach(group=>{
    group.addEventListener('click', (e)=>{
      const btn = e.target.closest('.toggle-btn');
      if(!btn) return;
      const hiddenInput = document.getElementById(group.dataset.target);
      const isSame = hiddenInput.value === btn.dataset.value;
      setToggleValue(group, isSame ? '' : btn.dataset.value);
    });
  });

  function applyToggles(data){
    document.querySelectorAll('.toggle-group').forEach(group=>{
      const target = group.dataset.target;
      const value = (data && data[target]) ? data[target] : '';
      const hiddenInput = document.getElementById(target);
      hiddenInput.value = value;
      group.querySelectorAll('.toggle-btn').forEach(b=>{
        b.classList.toggle('selected', b.dataset.value === value);
      });
    });
  }

  // ---------- form state ----------
  function collectFormData(){
    const data = {};
    FIELD_IDS.forEach(id=>{
      const el = document.getElementById(id);
      data[id] = el ? el.value : '';
    });
    return data;
  }

  function applyFormData(data){
    FIELD_IDS.forEach(id=>{
      const el = document.getElementById(id);
      if(el) el.value = (data && data[id]) ? data[id] : '';
    });
    applyToggles(data || {});
  }

  function clearForm(){
    FIELD_IDS.forEach(id=>{
      const el = document.getElementById(id);
      if(el) el.value = '';
    });
    applyToggles({});
  }

  let draftTimer = null;
  function saveDraftDebounced(){
    clearTimeout(draftTimer);
    draftTimer = setTimeout(async ()=>{
      const data = collectFormData();
      await storeSet(DRAFT_KEY, JSON.stringify(data));
    }, 400);
  }

  FIELD_IDS.forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.addEventListener('input', saveDraftDebounced);
  });

  // ---------- save / new ----------
  document.getElementById('saveBtn').addEventListener('click', async ()=>{
    const data = collectFormData();
    if(!data.builder && !data.location){
      showToast('Add builder or location first');
      return;
    }
    const id = 'o' + Date.now();
    const record = {
      id,
      savedAt: new Date().toISOString(),
      builder: data.builder,
      location: data.location,
      screenType: data.screenType,
      data
    };
    const ok = await storeSet(ORDERS_PREFIX + id, JSON.stringify(record));
    if(ok){
      await storeDelete(DRAFT_KEY);
      showToast('Order saved');
    } else {
      showToast('Could not save — try again');
    }
  });

  document.getElementById('newBtn').addEventListener('click', async ()=>{
    clearForm();
    await storeDelete(DRAFT_KEY);
    showToast('New blank order ready');
  });

  // ---------- history drawer ----------
  const drawer = document.getElementById('drawer');
  const backdrop = document.getElementById('drawerBackdrop');
  const drawerList = document.getElementById('drawerList');

  function fmtDate(iso){
    try{
      const d = new Date(iso);
      return d.toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'}) +
             ' · ' + d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
    }catch(e){ return iso; }
  }

  async function renderHistory(){
    const keys = await storeList(ORDERS_PREFIX);
    if(!keys || keys.length === 0){
      drawerList.innerHTML = '<div class="empty-state">No saved orders yet.<br>Fill in a sheet and tap save.</div>';
      return;
    }
    const records = [];
    for(const k of keys){
      const raw = await storeGet(k);
      if(raw){
        try{ records.push(JSON.parse(raw)); }catch(e){}
      }
    }
    records.sort((a,b)=> (b.savedAt||'').localeCompare(a.savedAt||''));
    drawerList.innerHTML = '';
    records.forEach(r=>{
      const card = document.createElement('div');
      card.className = 'order-card';
      const title = r.builder || r.location || 'Untitled order';
      const subBits = [];
      if(r.location && r.builder) subBits.push(r.location);
      if(r.screenType) subBits.push(r.screenType);
      card.innerHTML = `
        <div class="meta">
          <b>${escapeHtml(title)}</b>
          <span>${escapeHtml(subBits.join(' · ') || ' ')}</span>
          <span>${fmtDate(r.savedAt)}</span>
        </div>
        <div class="actions">
          <button class="mini-btn" data-action="load" data-id="${r.id}">Load</button>
          <button class="mini-btn del" data-action="delete" data-id="${r.id}">Delete</button>
        </div>
      `;
      drawerList.appendChild(card);
    });
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }

  drawerList.addEventListener('click', async (e)=>{
    const btn = e.target.closest('button[data-action]');
    if(!btn) return;
    const id = btn.getAttribute('data-id');
    const action = btn.getAttribute('data-action');
    if(action === 'load'){
      const raw = await storeGet(ORDERS_PREFIX + id);
      if(raw){
        try{
          const record = JSON.parse(raw);
          applyFormData(record.data);
          closeDrawer();
          showToast('Order loaded');
        }catch(e){ showToast('Could not load order'); }
      }
    } else if(action === 'delete'){
      await storeDelete(ORDERS_PREFIX + id);
      renderHistory();
      showToast('Order deleted');
    }
  });

  function openDrawer(){
    drawer.classList.add('open');
    backdrop.classList.add('open');
    renderHistory();
  }
  function closeDrawer(){
    drawer.classList.remove('open');
    backdrop.classList.remove('open');
  }
  document.getElementById('historyBtn').addEventListener('click', openDrawer);
  document.getElementById('closeDrawer').addEventListener('click', closeDrawer);
  backdrop.addEventListener('click', closeDrawer);

  // ---------- init ----------
  async function init(){
    const raw = await storeGet(DRAFT_KEY);
    if(raw){
      try{
        const data = JSON.parse(raw);
        applyFormData(data);
      }catch(e){}
    }
  }
  init();
})();
</script>
</body>
</html>
